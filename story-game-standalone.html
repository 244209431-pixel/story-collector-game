<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>✨ 故事收集家 - 打卡冒险游戏 ✨</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;700;900&display=swap');
:root {
  /* 🦄 独角兽彩虹主题色 */
  --pink:#FF6FB7;--magenta:#E84393;--purple:#A855F7;--deep-purple:#7C3AED;
  --blue:#4A7CF7;--sky:#60A5FA;--cyan:#22D3EE;
  --gold:#FFD700;--yellow:#FBBF24;--orange:#FB923C;
  --green:#34D399;--emerald:#10B981;
  --ruby:#F43F5E;--rose:#FB7185;

  /* 功能色 */
  --jump:linear-gradient(135deg,#FF6FB7,#A855F7);
  --jump1:#FF6FB7;--jump2:#A855F7;
  --swim:linear-gradient(135deg,#4A7CF7,#22D3EE);
  --swim1:#4A7CF7;--swim2:#22D3EE;
  --ok:#34D399;--ok2:#10B981;

  /* 背景 - 梦幻彩虹渐变 */
  --bg1:#FDE8F4;--bg2:#E8D5F8;--bg3:#D5E5FF;--bg4:#E0F7FF;

  /* 卡片和边框 */
  --card:rgba(255,255,255,0.65);
  --card-hover:rgba(255,255,255,0.8);
  --border:rgba(168,85,247,0.2);
  --border-gold:rgba(255,215,0,0.4);

  /* 文字色 */
  --t1:#4A1D6A;--t2:#6D3CA0;--t3:#9B8AB8;
  --t-white:#fff;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'ZCOOL KuaiLe','Noto Sans SC',sans-serif;
  background:linear-gradient(135deg,var(--bg1) 0%,var(--bg2) 30%,var(--bg3) 60%,var(--bg4) 100%);
  background-attachment:fixed;
  min-height:100vh;
  color:var(--t1);
  overflow-x:hidden;
}

/* ============ 彩虹闪光粒子 ============ */
.stars-container{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.star{
  position:absolute;
  width:6px;height:6px;
  border-radius:50%;
  animation:tw var(--d) ease-in-out infinite;
  opacity:0;
  box-shadow:0 0 6px currentColor;
}
@keyframes tw{0%,100%{opacity:0;transform:scale(0.5) rotate(0deg)}50%{opacity:var(--o);transform:scale(1.2) rotate(180deg)}}

.app-container{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:16px;min-height:100vh}
.page{display:none}.page.active{display:block}.page-pad{padding-bottom:80px}

/* ============ 状态栏 ============ */
.status-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;
  background:var(--card);
  border:2px solid var(--border);
  border-radius:24px;
  backdrop-filter:blur(20px);
  margin-bottom:16px;
  box-shadow:0 4px 20px rgba(168,85,247,0.1);
}
.avatar-section{display:flex;align-items:center;gap:12px}
.avatar{
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,#FF6FB7,#A855F7,#4A7CF7);
  display:flex;align-items:center;justify-content:center;
  font-size:26px;
  border:3px solid #FFD700;
  box-shadow:0 0 20px rgba(255,215,0,0.4),0 0 40px rgba(168,85,247,0.2);
  position:relative;
  animation:avatarGlow 3s ease-in-out infinite;
}
@keyframes avatarGlow{
  0%,100%{box-shadow:0 0 20px rgba(255,215,0,0.4),0 0 40px rgba(168,85,247,0.2)}
  50%{box-shadow:0 0 30px rgba(255,215,0,0.6),0 0 60px rgba(168,85,247,0.3)}
}
.avatar .crown{position:absolute;top:-12px;font-size:18px;filter:drop-shadow(0 0 4px rgba(255,215,0,0.6))}
.player-info h2{
  font-size:18px;
  background:linear-gradient(135deg,#A855F7,#FF6FB7);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  text-shadow:none;
  font-weight:900;
}
.player-info .title{font-size:13px;color:var(--t3)}
.title-badges{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.badge{padding:4px 10px;border-radius:10px;font-size:11px;font-weight:700;box-shadow:0 2px 6px rgba(0,0,0,0.1)}
.badge.hero{background:linear-gradient(135deg,#FF6FB7,#A855F7);color:#fff}
.badge.water{background:linear-gradient(135deg,#4A7CF7,#22D3EE);color:#fff}
.badge.dir{background:linear-gradient(135deg,#FFD700,#FB923C);color:#5A2D0C}
.streak-badge{
  background:linear-gradient(135deg,#FF6FB7,#A855F7,#4A7CF7);
  color:#fff;
  padding:10px 18px;border-radius:20px;
  font-size:15px;font-weight:700;
  box-shadow:0 4px 15px rgba(168,85,247,0.3);
  text-shadow:0 1px 2px rgba(0,0,0,0.1);
}

/* ============ 日期导航 ============ */
.date-nav{
  display:flex;gap:6px;margin-bottom:16px;padding:10px;
  background:var(--card);
  border:2px solid var(--border);
  border-radius:20px;
  backdrop-filter:blur(20px);
  box-shadow:0 2px 12px rgba(168,85,247,0.08);
}
.day-item{flex:1;text-align:center;padding:8px 2px;border-radius:14px;cursor:pointer;transition:.3s;position:relative}
.day-item .dn{font-size:13px;color:var(--t3);margin-bottom:2px}
.day-item .dd{font-size:19px;font-weight:700;color:var(--t1)}
.day-item.active{
  background:linear-gradient(135deg,#FF6FB7,#A855F7,#4A7CF7);
  box-shadow:0 4px 18px rgba(168,85,247,0.35);
}
.day-item.active .dn,.day-item.active .dd{color:#fff}
.day-item.done::after{
  content:'✓';position:absolute;top:-4px;right:-2px;
  width:18px;height:18px;background:linear-gradient(135deg,#34D399,#10B981);
  border-radius:50%;font-size:9px;display:flex;align-items:center;justify-content:center;
  color:#fff;box-shadow:0 2px 6px rgba(52,211,153,0.4);
}
.day-item.jd{border-bottom:3px solid #FF6FB7}
.day-item.sd{border-bottom:3px solid #4A7CF7}

/* ============ 通用卡片 ============ */
.card{
  background:var(--card);
  border:2px solid var(--border);
  border-radius:24px;
  padding:20px;
  margin-bottom:16px;
  backdrop-filter:blur(20px);
  box-shadow:0 4px 20px rgba(168,85,247,0.08);
  transition:transform 0.2s;
}
.card:hover{transform:translateY(-2px);box-shadow:0 6px 25px rgba(168,85,247,0.12)}
.card h3{font-size:20px;margin-bottom:16px;color:var(--t1)}

/* ============ 运动卡片 ============ */
.sport-card{
  background:var(--card);
  border:2px solid var(--border);
  border-radius:24px;
  padding:20px;margin-bottom:16px;
  backdrop-filter:blur(20px);
  position:relative;overflow:hidden;
  box-shadow:0 4px 20px rgba(168,85,247,0.1);
}
.sport-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;border-radius:4px 4px 0 0}
.sport-card.jc::before{background:linear-gradient(90deg,#FF6FB7,#A855F7,#FFD700)}
.sport-card.sc::before{background:linear-gradient(90deg,#4A7CF7,#22D3EE,#60A5FA)}
.sport-head{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.sport-icon{
  width:54px;height:54px;border-radius:18px;
  display:flex;align-items:center;justify-content:center;
  font-size:28px;
  box-shadow:0 4px 15px rgba(0,0,0,0.1);
}
.jc .sport-icon{background:linear-gradient(135deg,#FF6FB7,#A855F7)}
.sc .sport-icon{background:linear-gradient(135deg,#4A7CF7,#22D3EE)}
.sport-info h3{font-size:20px;margin-bottom:4px;color:var(--t1)}
.sport-info p{font-size:14px;color:var(--t3)}
.progress-bg{height:14px;background:rgba(168,85,247,0.1);border-radius:7px;overflow:hidden;margin-bottom:4px}
.progress-fill{height:100%;border-radius:7px;transition:width .8s cubic-bezier(.34,1.56,.64,1);position:relative}
.jc .progress-fill{background:linear-gradient(90deg,#FF6FB7,#A855F7,#FFD700);box-shadow:0 0 12px rgba(255,111,183,0.4)}
.sc .progress-fill{background:linear-gradient(90deg,#4A7CF7,#22D3EE,#60A5FA);box-shadow:0 0 12px rgba(74,124,247,0.4)}
.progress-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);animation:shimmer 2s infinite}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.progress-txt{display:flex;justify-content:space-between;font-size:15px;color:var(--t3);margin-bottom:12px}
.sport-actions{display:flex;gap:10px}
.jump-counter{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:12px}
.jump-counter input{
  width:90px;padding:10px;
  border:2px solid var(--border);border-radius:14px;
  background:rgba(255,255,255,0.5);
  color:var(--t1);font-family:inherit;font-size:18px;text-align:center;outline:none;
}
.jump-counter input:focus{border-color:#FF6FB7;box-shadow:0 0 10px rgba(255,111,183,0.2)}
.cnt-btn{
  width:42px;height:42px;border-radius:50%;border:none;
  font-size:18px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:.2s;
}
.cnt-btn:active{transform:scale(.9)}
.cnt-btn.mi{background:rgba(255,111,183,0.15);color:#FF6FB7}
.cnt-btn.pl{background:linear-gradient(135deg,#FF6FB7,#A855F7);color:#fff;box-shadow:0 3px 10px rgba(168,85,247,0.3)}

.btn{
  padding:14px;border:none;border-radius:16px;
  font-family:inherit;font-size:16px;font-weight:700;
  cursor:pointer;transition:.3s;
  display:flex;align-items:center;justify-content:center;gap:6px;flex:1;
}
.btn:active{transform:scale(.95)}
.btn-j{background:linear-gradient(135deg,#FF6FB7,#A855F7);color:#fff;box-shadow:0 4px 15px rgba(168,85,247,0.35)}
.btn-s{background:linear-gradient(135deg,#4A7CF7,#22D3EE);color:#fff;box-shadow:0 4px 15px rgba(74,124,247,0.35)}
.btn-ok{background:linear-gradient(135deg,#34D399,#10B981);color:#fff;box-shadow:0 4px 15px rgba(52,211,153,0.35)}
.btn-done{background:rgba(52,211,153,0.15)!important;color:var(--ok)!important;box-shadow:none!important;cursor:default;border:2px solid rgba(52,211,153,0.3)!important}

/* ============ 宝石 ============ */
.gems-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.gem-slot{
  aspect-ratio:1;border-radius:16px;
  background:rgba(255,255,255,0.4);
  border:2px dashed rgba(168,85,247,0.2);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;font-size:30px;transition:.4s;position:relative;
}
.gem-slot .gl{font-size:11px;color:var(--t3);text-align:center}
.gem-slot.on{
  border:2px solid rgba(255,215,0,0.5);
  background:linear-gradient(135deg,rgba(255,215,0,0.15),rgba(255,111,183,0.15));
  animation:gg 2s ease-in-out infinite;
}
.gem-slot.off{opacity:.5}.gem-slot.off .gi{filter:grayscale(1)}
@keyframes gg{0%,100%{box-shadow:0 0 8px rgba(255,215,0,0.2),0 0 15px rgba(168,85,247,0.1)}50%{box-shadow:0 0 20px rgba(255,215,0,0.4),0 0 30px rgba(168,85,247,0.2)}}

/* ============ 任务 ============ */
.task-item{
  display:flex;align-items:center;gap:12px;
  padding:14px;
  background:rgba(255,255,255,0.4);
  border-radius:16px;margin-bottom:8px;
  transition:.3s;cursor:pointer;
  border:2px solid transparent;
}
.task-item:hover{border-color:rgba(168,85,247,0.2);background:rgba(255,255,255,0.55)}
.task-item.done{background:linear-gradient(135deg,rgba(52,211,153,0.1),rgba(16,185,129,0.1));border-color:rgba(52,211,153,0.3)}
.task-cb{
  width:30px;height:30px;border-radius:50%;
  border:2px solid rgba(168,85,247,0.3);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;transition:.3s;flex-shrink:0;
  color:var(--t-white);
}
.task-item.done .task-cb{background:linear-gradient(135deg,#34D399,#10B981);border-color:#34D399}
.task-em{font-size:28px;flex-shrink:0}
.task-info{flex:1}.task-info h4{font-size:16px;margin-bottom:3px;color:var(--t1)}.task-info p{font-size:13px;color:var(--t3)}
.task-gem{font-size:24px;opacity:.3;transition:.3s}
.task-item.done .task-gem{opacity:1;animation:gp .5s ease}
@keyframes gp{0%{transform:scale(0)}50%{transform:scale(1.4)}100%{transform:scale(1)}}

/* ============ 故事书 ============ */
.story-book{
  background:linear-gradient(135deg,rgba(255,111,183,0.12),rgba(168,85,247,0.12),rgba(74,124,247,0.12));
  border:2px solid rgba(168,85,247,0.2);
  border-radius:20px;padding:20px;text-align:center;
}
.book-icon{font-size:56px;display:block;margin-bottom:12px}
.story-book h4{
  font-size:18px;
  background:linear-gradient(135deg,#A855F7,#FF6FB7);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  margin-bottom:6px;
}
.story-book p{font-size:15px;color:var(--t3);line-height:1.6}
.story-progress-bar{margin-top:14px;display:flex;gap:4px}
.sp-slot{flex:1;height:10px;background:rgba(168,85,247,0.1);border-radius:5px;transition:.3s}
.sp-slot.on{background:linear-gradient(90deg,#FF6FB7,#A855F7,#4A7CF7);box-shadow:0 0 10px rgba(168,85,247,0.4)}
.btn-unlock{
  margin-top:16px;width:100%;padding:16px;border:none;border-radius:16px;
  font-family:inherit;font-size:18px;font-weight:700;cursor:pointer;
  background:linear-gradient(135deg,#FF6FB7,#A855F7,#4A7CF7);
  color:#fff;
  box-shadow:0 4px 20px rgba(168,85,247,0.4);
  transition:.3s;
  text-shadow:0 1px 2px rgba(0,0,0,0.1);
}
.btn-unlock:disabled{background:rgba(168,85,247,0.15);color:var(--t3);box-shadow:none;cursor:not-allowed;text-shadow:none}
.btn-unlock:not(:disabled):hover{transform:translateY(-2px);box-shadow:0 6px 25px rgba(168,85,247,0.5)}
.btn-unlock:not(:disabled):active{transform:scale(.97)}

/* ============ 成就 ============ */
.ach-card{
  background:rgba(255,255,255,0.4);
  border:2px solid rgba(168,85,247,0.1);
  border-radius:16px;padding:14px;margin-bottom:8px;
  display:flex;align-items:center;gap:12px;transition:.3s;
}
.ach-card.on{border-color:rgba(255,215,0,0.4);background:linear-gradient(135deg,rgba(255,215,0,0.1),rgba(255,111,183,0.1))}
.ach-icon{
  width:52px;height:52px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:28px;flex-shrink:0;
}
.ach-card.off .ach-icon{background:rgba(168,85,247,0.08);filter:grayscale(1);opacity:.4}
.ach-card.on .ach-icon{background:linear-gradient(135deg,#FFD700,#FB923C);box-shadow:0 3px 10px rgba(255,215,0,0.3)}
.ach-info{flex:1}.ach-info h4{font-size:16px;margin-bottom:3px;color:var(--t1)}.ach-info p{font-size:13px;color:var(--t3)}
.ach-prog{font-size:14px;color:#A855F7;flex-shrink:0;font-weight:700}

/* ============ 宝箱 ============ */
.treasure-card{
  text-align:center;
  background:linear-gradient(135deg,rgba(255,111,183,0.1),rgba(168,85,247,0.1),rgba(255,215,0,0.1))!important;
  border-color:rgba(255,215,0,0.3)!important;
}
.treasure-chest{font-size:80px;margin-bottom:14px;display:inline-block;animation:cf 3s ease-in-out infinite}
@keyframes cf{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-8px) rotate(2deg)}}
.treasure-days{display:flex;justify-content:center;gap:6px;margin-bottom:16px}
.t-day{
  width:42px;height:42px;border-radius:12px;
  border:2px solid rgba(168,85,247,0.25);
  display:flex;align-items:center;justify-content:center;
  font-size:17px;color:var(--t3);
  background:rgba(255,255,255,0.3);transition:.3s;
}
.t-day.on{
  border-color:transparent;
  background:linear-gradient(135deg,#FF6FB7,#A855F7,#4A7CF7);
  color:#fff;
  box-shadow:0 3px 12px rgba(168,85,247,0.4);
}
.treasure-info{font-size:16px;color:var(--t3);margin-bottom:14px;line-height:1.7}
.treasure-info b{
  background:linear-gradient(135deg,#A855F7,#FF6FB7);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.btn-chest{
  padding:16px 40px;border:none;border-radius:20px;
  font-family:inherit;font-size:18px;font-weight:700;cursor:pointer;
  background:linear-gradient(135deg,#FF6FB7,#A855F7,#4A7CF7);
  color:#fff;
  box-shadow:0 4px 20px rgba(168,85,247,0.4);
  transition:.3s;
  text-shadow:0 1px 2px rgba(0,0,0,0.1);
}
.btn-chest:disabled{background:rgba(168,85,247,0.15);color:var(--t3);box-shadow:none;cursor:not-allowed;text-shadow:none}
.btn-chest:not(:disabled):active{transform:scale(.95)}

/* ============ 导演模式 ============ */
.director-mode{display:none}.director-mode.show{display:block}
.director-ta{
  width:100%;min-height:100px;
  background:rgba(255,255,255,0.5);
  border:2px solid var(--border);border-radius:16px;
  padding:14px;color:var(--t1);font-family:inherit;font-size:15px;
  resize:vertical;margin-bottom:12px;outline:none;
}
.director-ta:focus{border-color:#A855F7;box-shadow:0 0 15px rgba(168,85,247,0.15)}
.btn-submit{
  width:100%;padding:14px;border:none;border-radius:16px;
  font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;
  background:linear-gradient(135deg,#FF6FB7,#A855F7,#4A7CF7);
  color:#fff;
  box-shadow:0 4px 20px rgba(168,85,247,0.4);
  transition:.3s;
}

/* ============ 底部导航 ============ */
.bottom-nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(20px);
  border-top:2px solid var(--border);
  display:flex;padding:8px 16px;
  padding-bottom:max(8px,env(safe-area-inset-bottom));z-index:100;
  box-shadow:0 -4px 20px rgba(168,85,247,0.08);
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:8px;cursor:pointer;border-radius:14px;border:none;
  background:none;font-family:inherit;
  color:var(--t3);font-size:13px;transition:.3s;
}
.nav-item.active{
  color:#A855F7;
  background:linear-gradient(135deg,rgba(255,111,183,0.1),rgba(168,85,247,0.1));
}
.nav-icon{font-size:26px;transition:.3s}
.nav-item.active .nav-icon{transform:scale(1.15)}

/* ============ 模态框 ============ */
.modal-overlay{
  position:fixed;inset:0;background:rgba(74,29,106,0.6);
  z-index:200;display:none;align-items:center;justify-content:center;
  padding:20px;backdrop-filter:blur(10px);
}
.modal-overlay.show{display:flex;animation:fi .3s ease}
@keyframes fi{from{opacity:0}to{opacity:1}}
.modal-content{
  background:linear-gradient(135deg,#FFF5FA,#F3E8FF,#EBF0FF);
  border:2px solid rgba(168,85,247,0.3);
  border-radius:28px;padding:28px 24px;max-width:400px;width:100%;
  animation:ms .4s ease;position:relative;overflow:hidden;max-height:80vh;overflow-y:auto;
  box-shadow:0 20px 60px rgba(168,85,247,0.25);
}
@keyframes ms{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-content::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#FF6FB7,#A855F7,#4A7CF7,#FFD700)}
.modal-close{
  position:absolute;top:12px;right:12px;
  width:34px;height:34px;border-radius:50%;border:none;
  background:rgba(168,85,247,0.1);color:var(--t1);
  font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:.2s;
}
.modal-close:hover{background:rgba(168,85,247,0.2)}
.modal-title{
  font-size:22px;text-align:center;margin-bottom:18px;
  background:linear-gradient(135deg,#A855F7,#FF6FB7);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.modal-body{font-size:16px;color:var(--t2);line-height:1.8;text-align:center}
.story-text{
  background:rgba(168,85,247,0.06);
  border-radius:16px;padding:18px;margin:14px 0;

// ===== 游戏状态 =====
let G={
  date:new Date().toDateString(),jumpCount:0,swimDone:false,
  tasks:{sport:false,homework:false,study:false,outdoor:false},
  habits:{fast:false,tidy:false,polite:false},
  gems:[],streak:0,weekly:{},
  collected:[],myStories:[],
  ach:{jumpHero:false,waterSpirit:false,storyDirector:false,goodHabit:false},
  consJump:0,weekSwim:0,totalDays:0,dirUnlocked:false,
  // 每日详细记录（用于查看历史）
  history:{}
};

function save(){
  if(!currentUser)return;
  // 保存当天的实时快照到 history（方便随时查看）
  if(!G.history) G.history={};
  const dw=new Date().getDay();
  G.history[G.date]={
    tasks:{...G.tasks},
    habits:{...G.habits},
    jumpCount:G.jumpCount,
    swimDone:G.swimDone,
    gems:[...G.gems],
    sportType:JUMP.includes(dw)?'jump':'swim',
    allDone:Object.values(G.tasks).every(v=>v)
  };
  const key=SYNC_STORAGE_PREFIX+currentUser;
  const data={...G, _user:currentUser, _avatar:selectedAvatar, _lastSync:Date.now()};
  localStorage.setItem(key,JSON.stringify(data));
  // 异步同步到云端
  cloudSave(data);
}

function load(){
  if(!currentUser)return;
  const key=SYNC_STORAGE_PREFIX+currentUser;
  const s=localStorage.getItem(key);
  if(s){
    try{const d=JSON.parse(s);G={...G,...d};}catch(e){}
  }
  // 兼容旧版本：如果没有 history 字段则创建
  if(!G.history) G.history={};
  
  const today=new Date().toDateString();
  if(G.date!==today){
    // ====== 跨天处理 ======
    const prevDate=G.date; // 昨天（或上次打开的日期）
    
    // 1. 保存昨天的详细打卡记录到 history
    const sportDone=G.tasks.sport;
    const dw=new Date(prevDate).getDay();
    const wasJumpDay=JUMP.includes(dw);
    G.history[prevDate]={
      tasks:{...G.tasks},
      habits:{...G.habits},
      jumpCount:G.jumpCount,
      swimDone:G.swimDone,
      gems:[...G.gems],
      sportType:wasJumpDay?'jump':'swim',
      allDone:Object.values(G.tasks).every(v=>v)
    };
    
    // 2. 计算连续天数和总天数
    // 只要运动打卡了（核心任务）就算有效天
    const yesterdayAllDone=Object.values(G.tasks).every(v=>v);
    if(yesterdayAllDone){
      G.streak++;
      G.totalDays++;
      G.weekly[prevDate]=true;
    }else if(sportDone){
      // 运动完成了但其他没全完成，保持连续但不加总天数里的"全完成"标记
      G.streak++;
      G.totalDays++;
      G.weekly[prevDate]='partial'; // 部分完成
    }else{
      G.streak=0;
      G.weekly[prevDate]=false;
    }
    
    // 3. 重置今日数据
    G.jumpCount=0;
    G.swimDone=false;
    G.tasks={sport:false,homework:false,study:false,outdoor:false};
    G.habits={fast:false,tidy:false,polite:false};
    G.gems=[];
    G.date=today;
    
    // 4. 重置每日型成就（goodHabit 每天需要重新达成）
    G.ach.goodHabit=false;
    
    save();
  }
}

// ===== 超时 fetch 工具函数 =====
function fetchWithTimeout(url, options={}, timeout=5000){
  return Promise.race([
    fetch(url, options),
    new Promise((_,reject)=>setTimeout(()=>reject(new Error('请求超时')),timeout))
  ]);
}

// ===== 云端存储（使用免费的 jsonblob.com） =====
async function cloudSave(data){
  try{
    updateSyncUI('syncing');
    const blobId=localStorage.getItem('storyGame_blobId_'+currentUser);
    if(blobId){
      await fetchWithTimeout(JSONBLOB_API+'/'+blobId,{
        method:'PUT',
        headers:{'Content-Type':'application/json','Accept':'application/json'},
        body:JSON.stringify(data)
      },5000);
    }else{
      const resp=await fetchWithTimeout(JSONBLOB_API,{
        method:'POST',
        headers:{'Content-Type':'application/json','Accept':'application/json'},
        body:JSON.stringify(data)
      },5000);
      if(resp.ok){
        const loc=resp.headers.get('Location')||resp.headers.get('location');
        if(loc){
          const newId=loc.split('/').pop();
          localStorage.setItem('storyGame_blobId_'+currentUser,newId);
        }
      }
    }
    updateSyncUI('done');
  }catch(e){
    console.log('云端同步失败，使用本地存储',e);
    updateSyncUI('offline');
  }
}

async function cloudLoad(){
  try{
    updateSyncUI('syncing');
    const blobId=localStorage.getItem('storyGame_blobId_'+currentUser);
    if(!blobId){updateSyncUI('done');return false;}
    const resp=await fetchWithTimeout(JSONBLOB_API+'/'+blobId,{
      headers:{'Accept':'application/json'}
    },5000);
    if(resp.ok){
      const data=await resp.json();
      if(data&&data._user===currentUser){
        const localKey=SYNC_STORAGE_PREFIX+currentUser;
        const localStr=localStorage.getItem(localKey);
        let localData=null;
        try{localData=localStr?JSON.parse(localStr):null;}catch(e){}
        if(!localData||!localData._lastSync||data._lastSync>localData._lastSync){
          G={...G,...data};
          localStorage.setItem(localKey,JSON.stringify(data));
          updateSyncUI('done');
          return true;
        }
      }
    }
    updateSyncUI('done');
    return false;
  }catch(e){
    console.log('云端加载失败，使用本地数据',e);
    updateSyncUI('offline');
    return false;
  }
}

function updateSyncUI(status){
  const dot=document.getElementById('syncDot');
  const loginSync=document.getElementById('syncStatus');
  if(status==='syncing'){
    if(dot)dot.textContent='🔄';
    if(loginSync)loginSync.textContent='🔄 正在同步...';
  }else if(status==='done'){
    if(dot)dot.textContent='☁️';
    if(loginSync)loginSync.textContent='✅ 云端已同步';
  }else{
    if(dot)dot.textContent='📴';
    if(loginSync)loginSync.textContent='📴 离线模式（数据存在本地）';
  }
}

// ===== 日期导航 =====
function renderDateNav(){
  const nav=document.getElementById('dateNav');nav.innerHTML='';
  const today=new Date(),dow=today.getDay();
  for(let i=0;i<7;i++){
    const d=new Date(today);d.setDate(today.getDate()-dow+i);
    const ds=d.toDateString();
    const isToday=ds===today.toDateString();
    const isFuture=d>today&&!isToday;
    const dw=d.getDay(),isJ=JUMP.includes(dw),isS=SWIM.includes(dw);
    const status=G.weekly[ds]; // true=全完成, 'partial'=部分完成, false=未完成, undefined=未到
    const hist=G.history&&G.history[ds];
    const div=document.createElement('div');
    let cls='day-item';
    if(isToday)cls+=' active';
    if(isJ)cls+=' jd';
    if(isS)cls+=' sd';
    if(status===true)cls+=' done';
    else if(status==='partial')cls+=' partial';
    if(isFuture)cls+=' future';
    div.className=cls;
    
    // 状态图标
    let statusIcon='';
    if(isToday){
      statusIcon='';
    }else if(status===true){
      statusIcon='<div class="day-status">✅</div>';
    }else if(status==='partial'){
      statusIcon='<div class="day-status">🔶</div>';
    }else if(status===false){
      statusIcon='<div class="day-status">❌</div>';
    }
    
    div.innerHTML=`<div class="dn">周${W[dw]}</div><div class="dd">${d.getDate()}</div>${statusIcon}`;
    
    // 点击查看历史（非未来日期）
    if(!isFuture){
      div.style.cursor='pointer';
      div.onclick=(function(dateStr,isT){
        return function(){
          if(isT){
            // 点击今天：关闭历史面板
            closeHistoryPanel();
          }else{
            showHistoryDetail(dateStr);
          }
        };
      })(ds,isToday);
    }
    nav.appendChild(div);
  }
}

      <div class="progress-txt"><span>已跳 ${G.jumpCount} 个</span><span>${done?'✅ 已完成！':'还差 '+(1000-G.jumpCount)+' 个'}</span></div>
      ${!done?`<div class="jump-counter">
        <button class="cnt-btn mi" onclick="addJump(-50)">-50</button>
        <input type="number" id="jumpIn" value="100" min="1" max="500"/>
        <button class="cnt-btn pl" onclick="addJump(+parseInt(document.getElementById('jumpIn').value)||100)">+加</button>
      </div>
      <div class="sport-actions">
        <button class="btn btn-j" onclick="addJump(100)">➕ 跳100个</button>
        <button class="btn btn-ok" onclick="completeJump()">✅ 完成</button>
      </div>`:`<div class="sport-actions"><button class="btn btn-done">🎉 跳绳已完成！太棒了！</button></div>`}
    </div>`;
  }else if(isS){
    h=`<div class="sport-card sc">
      <div class="sport-head"><div class="sport-icon">🏊‍♀️</div>
        <div class="sport-info"><h3>今日游泳日 🌊</h3><p>完成今日游泳课</p></div></div>
      <div class="progress-bg"><div class="progress-fill" style="width:${G.swimDone?100:0}%"></div></div>
      <div class="progress-txt"><span>${G.swimDone?'游泳课已完成':'等待完成'}</span><span>本周 ${G.weekSwim}/2 次</span></div>
      <div class="sport-actions">
        ${!G.swimDone?`<button class="btn btn-s" onclick="completeSwim()">🏊 完成游泳课打卡</button>`
        :`<button class="btn btn-done">🎉 游泳课已完成！</button>`}
      </div></div>`;
  }
  c.innerHTML=h;
}

// ===== 宝石 =====
function renderGems(){
  const g=document.getElementById('gemsGrid');
  const dw=new Date().getDay(),isJ=JUMP.includes(dw);
  const gems=[
    {n:isJ?'跳绳':'游泳',i:isJ?'🧡':'💙',k:'sport'},
    {n:'作业',i:'💜',k:'homework'},{n:'学习',i:'💛',k:'study'},
    {n:'习惯',i:'💚',k:'outdoor'},{n:'故事',i:'❤️',k:'story'}
  ];
  g.innerHTML=gems.map(gm=>{
    const on=G.tasks[gm.k]||G.gems.includes(gm.k);
    return `<div class="gem-slot ${on?'on':'off'}"><span class="gi">${on?gm.i:'🔒'}</span><span class="gl">${gm.n}</span></div>`;
  }).join('');
}

// ===== 任务 =====
function renderTasks(){
  const l=document.getElementById('tasksList');
  const dw=new Date().getDay(),isJ=JUMP.includes(dw);
  const tasks=[
    {k:'sport',e:isJ?'🏃‍♀️':'🏊‍♀️',t:isJ?`跳绳 ${G.jumpCount}/1000`:'完成游泳课',d:isJ?'今天是跳绳日！加油！':'今天是游泳日！加油！',g:isJ?'🧡':'💙'},
    {k:'homework',e:'📝',t:'认真高效完成学校作业',d:'专注写作业，不拖拉不磨蹭',g:'💜'},
    {k:'study',e:'📖',t:'认真高效学习完成新概念',d:'每天30-60分钟，专注学习',g:'💛'},
    {k:'outdoor',e:'⭐',t:'今日行为习惯达标',d:'做事快速、自律、有礼貌',g:'💚'}
  ];
  l.innerHTML=tasks.map(t=>{
    const done=G.tasks[t.k];
    const clickAction=t.k==='sport'||t.k==='outdoor'?'':'toggleTask(\''+t.k+'\')';
    return `<div class="task-item ${done?'done':''}" onclick="${clickAction}">
      <div class="task-cb">${done?'✓':''}</div><div class="task-em">${t.e}</div>
      <div class="task-info"><h4>${t.t}</h4><p>${t.d}</p></div>
      <div class="task-gem">${t.g}</div></div>`;
  }).join('');
}

// ===== 故事进度 =====
function renderStoryProg(){
  const bar=document.getElementById('storyProgressBar');
  const done=Object.values(G.tasks).filter(v=>v).length,total=4;
  bar.innerHTML='';
  for(let i=0;i<total;i++){const d=document.createElement('div');d.className='sp-slot'+(i<done?' on':'');bar.appendChild(d)}
  const btn=document.getElementById('btnUnlock'),tt=document.getElementById('storyTitle'),pv=document.getElementById('storyPreview');
  if(done>=total){btn.disabled=false;btn.textContent='✨ 解锁今日故事！';tt.textContent='🌟 故事已就绪！';pv.textContent='所有宝石已集齐，点击解锁故事！'}
  else{btn.disabled=true;btn.textContent=`🔮 还需 ${total-done} 块宝石`;tt.textContent='等待宝石解锁...';pv.textContent=`已收集 ${done}/${total} 块宝石`}
}

// ===== 操作 =====
function addJump(n){
  if(G.tasks.sport)return;
  G.jumpCount=Math.max(0,G.jumpCount+n);
  if(G.jumpCount>=1000){G.jumpCount=1000;G.tasks.sport=true;G.consJump++;gemAnim('🧡');checkJumpHero()}
  renderSport();renderGems();renderTasks();renderStoryProg();save();
}
function completeJump(){G.jumpCount=1000;G.tasks.sport=true;G.consJump++;gemAnim('🧡');renderSport();renderGems();renderTasks();renderStoryProg();checkJumpHero();save()}
function completeSwim(){
  if(G.swimDone)return;G.swimDone=true;G.tasks.sport=true;G.weekSwim++;
  gemAnim('💙');renderSport();renderGems();renderTasks();renderStoryProg();checkWaterSpirit();save();
}
function toggleTask(k){
  if(k==='outdoor')return; // outdoor由行为习惯模块控制
  G.tasks[k]=!G.tasks[k];
  if(G.tasks[k]){const m={homework:'💜',study:'💛'};if(m[k])gemAnim(m[k]);if(!G.gems.includes(k))G.gems.push(k)}
  else G.gems=G.gems.filter(g=>g!==k);
  renderGems();renderTasks();renderStoryProg();save();
}

// ===== 动画 =====
function gemAnim(g){
  const el=document.createElement('div');el.className='gem-fly';el.textContent=g;
  el.style.left=(innerWidth/2-24)+'px';el.style.top=(innerHeight/2)+'px';
  document.body.appendChild(el);setTimeout(()=>el.remove(),1200);
  // 更多更大的掉落装饰
  for(let i=0;i<16;i++)setTimeout(()=>{
    const c=document.createElement('div');c.className='confetti';
    c.textContent=['✨','⭐','💫','🌈','🦄','🎀','💖','🔮','👑','🌟','💎','🎆'][~~(Math.random()*12)];
    c.style.left=Math.random()*innerWidth+'px';c.style.top='-30px';
    c.style.animationDelay=Math.random()*0.6+'s';
    c.style.fontSize=(28+Math.random()*20)+'px';
    document.body.appendChild(c);setTimeout(()=>c.remove(),3000);
  },i*60);
  // 放一朵烟花
  setTimeout(()=>launchFirework(innerWidth*0.3+Math.random()*innerWidth*0.4, innerHeight*0.2+Math.random()*innerHeight*0.3),300);
}
function bigConfetti(){
  for(let i=0;i<40;i++)setTimeout(()=>{
    const c=document.createElement('div');c.className='confetti';
    c.textContent=['🦄','🌈','✨','💖','👑','📖','💎','🔮','🎀','⭐','🎆','🌟'][~~(Math.random()*12)];
    c.style.left=Math.random()*innerWidth+'px';c.style.top='-30px';
    c.style.animationDelay=Math.random()*1.2+'s';
    c.style.fontSize=(30+Math.random()*24)+'px';
    document.body.appendChild(c);setTimeout(()=>c.remove(),3500);
  },i*60);
  // 放3朵烟花
  for(let i=0;i<3;i++){
    setTimeout(()=>launchFirework(innerWidth*(0.2+Math.random()*0.6), innerHeight*(0.15+Math.random()*0.35)),400+i*500);
  }
}

// ===== 烟花效果 🎆 =====
function launchFirework(x,y){
  const colors=['#FF6FB7','#A855F7','#4A7CF7','#FFD700','#22D3EE','#FB7185','#34D399','#FBBF24','#DA77F2','#F43F5E'];
  const color1=colors[~~(Math.random()*colors.length)];
  const color2=colors[~~(Math.random()*colors.length)];
  // 扩散光环
  const ring=document.createElement('div');
  ring.className='firework-ring';
  ring.style.left=(x-5)+'px';ring.style.top=(y-5)+'px';
  ring.style.borderColor=color1;
  document.body.appendChild(ring);setTimeout(()=>ring.remove(),900);
  // 粒子爆炸
  const count=18+~~(Math.random()*10);
  for(let i=0;i<count;i++){
    const p=document.createElement('div');
    p.className='firework-particle';
    const angle=(Math.PI*2/count)*i;
    const dist=60+Math.random()*80;
    const fx=Math.cos(angle)*dist;
    const fy=Math.sin(angle)*dist;
    p.style.left=(x-4)+'px';p.style.top=(y-4)+'px';
    p.style.setProperty('--fx',fx+'px');
    p.style.setProperty('--fy',fy+'px');
    p.style.background=(i%2===0)?color1:color2;
    p.style.boxShadow=`0 0 6px ${(i%2===0)?color1:color2}`;
    p.style.width=(5+Math.random()*6)+'px';
    p.style.height=p.style.width;
    p.style.animationDelay=(Math.random()*0.15)+'s';
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),1500);
  }
}

// ===== 故事解锁 =====
function unlockStory(){
  const dw=new Date().getDay(),isJ=JUMP.includes(dw);
  const pool=isJ?STORIES.jump:STORIES.swim;
  const story=pool[~~(Math.random()*pool.length)];
  if(!G.gems.includes('story'))G.gems.push('story');
  G.collected.push({...story,date:new Date().toLocaleDateString('zh-CN'),type:isJ?'jump':'swim'});
  renderGems();renderCollected();save();showStoryModal(story);bigConfetti();
}
function showStoryModal(s){
  document.getElementById('mStoryTitle').textContent=s.title;
  let b=`<div class="story-text">${s.text.replace(/\n/g,'<br>')}</div>`;
  if(s.choices&&s.choices.length){
    b+='<p style="margin-top:12px;color:var(--gold);font-size:13px">选择你想要的结局：</p><div class="story-choices">';
    s.choices.forEach(c=>{b+=`<button class="s-choice" onclick="selectEnd('${c.ending}')">${c.text}</button>`});
    b+='</div>';
  }
  document.getElementById('mStoryBody').innerHTML=b;
  document.getElementById('storyModal').classList.add('show');
}
function selectEnd(e){
  document.getElementById('mStoryBody').innerHTML+=`<div style="margin-top:16px;padding:14px;background:rgba(255,215,0,.1);border-radius:12px;border:1px solid rgba(255,215,0,.3)">
    <p style="color:var(--gold);font-size:14px">🎬 你选择了「${e}」</p><p style="color:var(--t2);font-size:12px;margin-top:6px">已保存到成长宝箱！</p></div>`;
  document.querySelectorAll('.s-choice').forEach(b=>b.style.display='none');
}
function closeModal(id){document.getElementById(id).classList.remove('show')}

// ===== 成就 =====
function checkJumpHero(){
  if(G.consJump>=3&&!G.ach.jumpHero){G.ach.jumpHero=true;save();
    setTimeout(()=>showAchModal('🦸‍♀️ 跳绳小英雄！',STORIES.hero),800);renderAch();}
}
function checkWaterSpirit(){
  if(G.weekSwim>=2&&!G.ach.waterSpirit){G.ach.waterSpirit=true;save();
    setTimeout(()=>showAchModal('🧜‍♀️ 水中精灵觉醒！',STORIES.spirit),800);renderAch();}
}
function showAchModal(title,s){
  document.getElementById('mAchTitle').textContent=title;
  document.getElementById('mAchBody').innerHTML=`<div class="story-text">${s.text.replace(/\n/g,'<br>')}</div><p style="margin-top:12px;color:var(--ok);font-size:13px">🏆 成就已解锁！</p>`;
  document.getElementById('achieveModal').classList.add('show');bigConfetti();
}
function renderAch(){
  const l=document.getElementById('achievementsList');
  const achs=[
    {k:'jumpHero',i:'🦸‍♀️',t:'跳绳小英雄',d:'连续3天完成跳绳',p:`${Math.min(3,G.consJump)}/3天`},
    {k:'waterSpirit',i:'🧜‍♀️',t:'水中精灵',d:'本周完成两次游泳课',p:`${Math.min(2,G.weekSwim)}/2次`},
    {k:'goodHabit',i:'🌟',t:'好习惯之星',d:'行为习惯全部达标',p:Object.values(G.habits).filter(v=>v).length+'/3项'},
    {k:'storyDirector',i:'🎬',t:'故事导演权',d:'集满7天宝箱碎片',p:`${Math.min(7,G.totalDays)}/7天`}
  ];
  l.innerHTML=achs.map(a=>{
    const on=G.ach[a.k];
    return `<div class="ach-card ${on?'on':'off'}"><div class="ach-icon">${a.i}</div>
      <div class="ach-info"><h4>${a.t}</h4><p>${a.d}</p></div>
      <div class="ach-prog">${on?'✅ 已解锁':a.p}</div></div>`;
  }).join('');
}

// ===== 宝箱 =====
function renderTreasure(){
  const d=document.getElementById('treasureDays');d.innerHTML='';
  for(let i=0;i<7;i++){const div=document.createElement('div');div.className='t-day'+(i<G.totalDays?' on':'');div.textContent=i<G.totalDays?'💎':(i+1);d.appendChild(div)}
  const btn=document.getElementById('btnChest');
  if(G.totalDays>=7){btn.disabled=false;btn.textContent='🎉 开启成长宝箱！';document.getElementById('treasureChest').textContent='🎁'}
  else{btn.disabled=true;btn.textContent=`🔒 还需 ${7-G.totalDays} 天`}
  if(G.dirUnlocked)document.getElementById('directorMode').classList.add('show');
  renderMyStories();renderCollected();
}
function openChest(){
  G.dirUnlocked=true;G.ach.storyDirector=true;save();
  document.getElementById('directorMode').classList.add('show');
  document.getElementById('btnChest').style.display='none';
  showAchModal('🎬 故事导演权解锁！',{text:'🎉🎉🎉 恭喜恭喜！\n\n你坚持了整整7天！你是最棒的故事收集家！\n\n作为奖励，你现在拥有了「故事导演权」——可以自己编写故事加入游戏！\n\n快去写下你自己的故事吧！✨'});
  renderAch();renderTreasure();
}
function submitStory(){
  const ta=document.getElementById('directorTa'),txt=ta.value.trim();
  if(!txt)return;
  G.myStories.push({text:txt,date:new Date().toLocaleDateString('zh-CN'),title:'🎬 '+txt.substring(0,15)+'...'});
  ta.value='';save();renderMyStories();gemAnim('🎬');
}
function renderMyStories(){
  const c=document.getElementById('myStories');
  c.innerHTML=G.myStories.map((s,idx)=>`<div class="collected-item" onclick="showMyStory(${idx})">
    <h4>${s.title}</h4><p>${s.date} · 我的创作</p></div>`).join('');
}
function showMyStory(idx){
  const s=G.myStories[idx];
  if(s)showStoryModal({title:s.title,text:s.text,choices:[]});
}
function renderCollected(){
  const c=document.getElementById('collectedStories');
  if(!G.collected.length){c.innerHTML='<p style="text-align:center;color:var(--t3);font-size:13px;padding:20px">还没有收集到故事，完成任务来解锁吧！</p>';return}
  c.innerHTML=G.collected.map((s,idx)=>`<div class="collected-item" onclick="showCollectedStory(${idx})">
    <div style="display:flex;align-items:center;gap:8px"><span style="font-size:20px">${s.type==='jump'?'🏃‍♀️':'🏊‍♀️'}</span><div>
    <h4>${s.title}</h4><p>${s.date} · ${s.type==='jump'?'跳绳日故事':'游泳日故事'}</p></div></div></div>`).join('');
}
function showCollectedStory(idx){
  const s=G.collected[idx];
  if(s)showStoryModal({title:s.title,text:s.text,choices:[]});
}

// ===== 行为习惯 ⭐ =====
function renderHabits(){
  const l=document.getElementById('habitsList');
  if(!l)return;
  const habits=[
    {k:'fast',e:'⚡',t:'做事快速不拖拉',d:'行动力满满，说做就做！'},
    {k:'tidy',e:'🧹',t:'自己的事情自己做',d:'整理书包、收拾房间、自律自觉'},
    {k:'polite',e:'💝',t:'有礼貌、好态度',d:'对人友善，积极乐观，不发脾气'}
  ];
  l.innerHTML=habits.map(h=>{
    const done=G.habits[h.k];
    return `<div class="task-item ${done?'done':''}" onclick="toggleHabit('${h.k}')">
      <div class="task-cb">${done?'✓':''}</div><div class="task-em">${h.e}</div>
      <div class="task-info"><h4>${h.t}</h4><p>${h.d}</p></div>
      <div class="task-gem">${done?'⭐':'☆'}</div></div>`;
  }).join('');
}
function toggleHabit(k){
  G.habits[k]=!G.habits[k];
  if(G.habits[k])gemAnim('⭐');
  const allDone=Object.values(G.habits).every(v=>v);
  if(allDone&&!G.ach.goodHabit){
    G.ach.goodHabit=true;
    G.tasks.outdoor=true;
    gemAnim('💚');
    renderGems();renderTasks();renderStoryProg();
    setTimeout(()=>showAchModal('🌟 好习惯之星！',{text:'🎉 太棒了！\n\n你今天的行为习惯全部达标！\n\n做事快速不拖拉 ⚡\n自己的事情自己做 🧹\n有礼貌好态度 💝\n\n你就是最闪亮的好习惯之星！继续保持哦！✨'}),600);
    renderAch();
  } else if(allDone){
    G.tasks.outdoor=true;
    renderGems();renderTasks();renderStoryProg();
  } else {
    G.tasks.outdoor=false;
    G.gems=G.gems.filter(g=>g!=='outdoor');
    renderGems();renderTasks();renderStoryProg();
  }
  renderHabits();save();
}

// ===== 状态栏 =====
function updateStatus(){
  document.getElementById('streakCount').textContent=G.streak;
  const badges=document.getElementById('titleBadges');let bh='';
  if(G.ach.jumpHero)bh+='<span class="badge hero">🦸‍♀️ 跳绳小英雄</span>';
  if(G.ach.waterSpirit)bh+='<span class="badge water">🧜‍♀️ 水中精灵</span>';
  if(G.ach.storyDirector)bh+='<span class="badge dir">🎬 故事导演</span>';
  badges.innerHTML=bh;
  if(G.totalDays>=7){document.getElementById('crownIcon').style.display='';document.getElementById('playerTitle').textContent='传奇故事收集家'}
  else if(G.totalDays>=3)document.getElementById('playerTitle').textContent='资深冒险者';
  else if(G.streak>=1)document.getElementById('playerTitle').textContent='初级冒险者';
}

// ===== 初始化 =====
function initGame(){
  createStars();renderDateNav();renderSport();renderGems();renderTasks();renderStoryProg();renderHabits();renderAch();renderTreasure();updateStatus();
}

// 启动：检查是否已登录
(async function startup(){
  createStars(); // 先创建背景粒子
  // 版本标记：v2 表示密码登录版本，旧版本没有这个标记需要重新验证密码
  const loginVer=localStorage.getItem('storyGame_loginVer');
  if(!loginVer||loginVer<'v2'){
    // 旧版本登录状态，清除并要求重新输密码
    localStorage.removeItem('storyGame_currentUser');
    localStorage.removeItem('storyGame_currentAvatar');
  }
  const savedUser=localStorage.getItem('storyGame_currentUser');
  if(savedUser===ACCOUNT_NAME){
    // 自动登录（之前已验证过密码）
    currentUser=ACCOUNT_NAME;
    selectedAvatar=ACCOUNT_AVATAR;
    
    // 先从本地加载（立即生效）
    load();
    
    // 异步尝试云端加载（不阻塞界面显示）
    cloudLoad().catch(()=>{});
    
    // 显示游戏界面
    document.getElementById('loginOverlay').style.display='none';
    document.getElementById('appContainer').style.display='';
    document.querySelector('.bottom-nav').style.display='';
    
    // 设置头像和名称
    document.querySelector('.avatar').textContent=ACCOUNT_AVATAR;
    const crown=document.getElementById('crownIcon');
    if(crown)document.querySelector('.avatar').innerHTML=ACCOUNT_AVATAR+'<span class="crown" id="crownIcon" '+(G.totalDays>=7?'':'style="display:none"')+'>👑</span>';
    document.getElementById('playerName').textContent=ACCOUNT_NAME;
    
    initGame();
    
    // 开启自动同步
    if(syncTimer)clearInterval(syncTimer);
    syncTimer=setInterval(()=>{
      if(currentUser)cloudSave({...G,_user:currentUser,_avatar:selectedAvatar,_lastSync:Date.now()});
    },30000);
  }else{
    // 显示登录页，隐藏游戏
    document.getElementById('loginOverlay').style.display='';
    document.getElementById('appContainer').style.display='none';
    document.querySelector('.bottom-nav').style.display='none';
    document.getElementById('passwordInput').focus();
  }
  // 监听回车键
  document.getElementById('passwordInput').addEventListener('keypress',function(e){
    if(e.key==='Enter')doLogin();
  });
})();
</script>
